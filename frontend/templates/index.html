<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환율 & WTI 유가 대시보드</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <nav class="topbar">
    <div class="container d-flex align-items-center justify-content-between">
      <span class="topbar-title">환율 &amp; WTI 유가 대시보드</span>
      <span class="topbar-sub">원유 에너지 비용 모니터링</span>
    </div>
  </nav>

  <div class="container py-4">

    <!-- 상단 카드 3개 -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="summary-card">
          <div class="summary-label">원/달러 환율</div>
          <div class="summary-value" id="usd-value">—</div>
          <div class="summary-change" id="usd-change">—</div>
          <div class="summary-date" id="usd-date"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="summary-card">
          <div class="summary-label">WTI 유가</div>
          <div class="summary-value" id="wti-value">—</div>
          <div class="summary-change" id="wti-change">—</div>
          <div class="summary-date" id="wti-date"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="summary-card">
          <div class="summary-label">원화 에너지 비용</div>
          <div class="summary-value" id="energy-value">—</div>
          <div class="summary-change text-muted" style="font-size:0.82rem;">환율 × WTI (원/배럴)</div>
          <div class="summary-date" id="energy-date"></div>
        </div>
      </div>
    </div>

    <!-- 차트 탭 -->
    <div class="chart-card mb-4">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="usdkrw">환율 추이</button>
        <button class="tab-btn" data-tab="wti">유가 추이</button>
        <button class="tab-btn" data-tab="energy">에너지 비용</button>
      </div>
      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <!-- 계산기 -->
    <div class="chart-card mb-4">
      <div class="calc-title">원화 에너지 비용 계산기</div>
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label calc-label">환율 (원/달러)</label>
          <input type="number" class="form-control calc-input" id="calc-usd" placeholder="예: 1350">
        </div>
        <div class="col-md-4">
          <label class="form-label calc-label">WTI 유가 (달러/배럴)</label>
          <input type="number" class="form-control calc-input" id="calc-wti" placeholder="예: 85">
        </div>
        <div class="col-md-4">
          <button class="btn-calc w-100" id="calc-btn">계산하기</button>
        </div>
      </div>

      <div id="calc-result" class="result-box mt-3" style="display:none;">
        <div class="result-cost" id="result-cost"></div>
        <div class="result-unit">원 / 배럴</div>
        <div class="result-judgment" id="result-judgment"></div>
        <div class="result-avg" id="result-avg"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    let chart = null;
    let avgEnergy = null;

    const tabConfig = {
      usdkrw: {
        label: 'USD/KRW (원/달러)',
        color: '#2563eb',
        fill: 'rgba(37,99,235,0.07)',
        url: '/api/chart/usdkrw',
        fmt: v => v.toLocaleString('ko-KR', { minimumFractionDigits: 2 }) + ' 원',
        yFmt: v => v.toLocaleString('ko-KR', { maximumFractionDigits: 0 }),
      },
      wti: {
        label: 'WTI 유가 (달러/배럴)',
        color: '#f59e0b',
        fill: 'rgba(245,158,11,0.07)',
        url: '/api/chart/wti',
        fmt: v => '$ ' + v.toFixed(2),
        yFmt: v => '$ ' + v.toFixed(0),
      },
      energy: {
        label: '원화 에너지 비용 (원/배럴)',
        color: '#dc2626',
        fill: 'rgba(220,38,38,0.07)',
        url: '/api/chart/energy',
        fmt: v => Math.round(v).toLocaleString('ko-KR') + ' 원/배럴',
        yFmt: v => v.toLocaleString('ko-KR', { maximumFractionDigits: 0 }),
      },
    };

    // 상단 카드 로드
    async function loadSummary() {
      const res = await fetch('/api/summary');
      const d = await res.json();

      const usd = d.usd_krw;
      const wti = d.wti;

      document.getElementById('usd-value').textContent =
        usd.value ? usd.value.toLocaleString('ko-KR', { minimumFractionDigits: 2 }) + ' 원' : '—';
      setChange('usd-change', usd.change, '원');
      document.getElementById('usd-date').textContent = usd.date ? '기준일: ' + usd.date : '';

      document.getElementById('wti-value').textContent =
        wti.value ? '$ ' + wti.value.toFixed(2) : '—';
      setChange('wti-change', wti.change, '$');
      document.getElementById('wti-date').textContent = wti.date ? '기준일: ' + wti.date : '';

      if (usd.value && wti.value) {
        const energy = Math.round(usd.value * wti.value);
        document.getElementById('energy-value').textContent = energy.toLocaleString('ko-KR') + ' 원/배럴';
        document.getElementById('energy-date').textContent = '기준일: ' + usd.date;
      }

      // 계산기 초기값 세팅
      if (usd.value) document.getElementById('calc-usd').value = usd.value;
      if (wti.value) document.getElementById('calc-wti').value = wti.value;
    }

    function setChange(elId, change, unit) {
      const el = document.getElementById(elId);
      if (change === null || change === undefined) {
        el.textContent = '전일 대비 —';
        el.className = 'summary-change text-muted';
        return;
      }
      const sign = change >= 0 ? '+' : '';
      const formatted = unit === '원'
        ? change.toLocaleString('ko-KR', { minimumFractionDigits: 2 })
        : change.toFixed(2);
      el.textContent = `전일 대비 ${sign}${formatted} ${unit}`;
      el.className = 'summary-change ' + (change > 0 ? 'change-up' : change < 0 ? 'change-down' : 'text-muted');
    }

    // 차트 로드
    async function loadChart(tab) {
      const cfg = tabConfig[tab];
      const res = await fetch(cfg.url);
      const d = await res.json();

      if (chart) chart.destroy();

      chart = new Chart(document.getElementById('mainChart'), {
        type: 'line',
        data: {
          labels: d.labels,
          datasets: [{
            label: cfg.label,
            data: d.data,
            borderColor: cfg.color,
            backgroundColor: cfg.fill,
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 4,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => cfg.fmt(ctx.parsed.y),
              },
            },
          },
          scales: {
            x: {
              ticks: { maxTicksLimit: 12, maxRotation: 0, font: { size: 11 } },
              grid: { display: false },
            },
            y: {
              ticks: { font: { size: 11 }, callback: cfg.yFmt },
              grid: { color: 'rgba(0,0,0,0.05)' },
            },
          },
        },
      });
    }

    // 탭 전환
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadChart(btn.dataset.tab);
      });
    });

    // 2년 평균 로드
    async function loadAvgEnergy() {
      const res = await fetch('/api/avg_energy');
      const d = await res.json();
      avgEnergy = d.avg_energy;
    }

    // 계산기
    document.getElementById('calc-btn').addEventListener('click', () => {
      const usd = parseFloat(document.getElementById('calc-usd').value);
      const wti = parseFloat(document.getElementById('calc-wti').value);
      if (!usd || !wti) return;

      const cost = Math.round(usd * wti);
      document.getElementById('result-cost').textContent = cost.toLocaleString('ko-KR');

      const resultEl = document.getElementById('calc-result');
      resultEl.style.display = 'block';

      if (avgEnergy) {
        const ratio = cost / avgEnergy;
        document.getElementById('result-avg').textContent =
          `2년 평균 ${Math.round(avgEnergy).toLocaleString('ko-KR')} 원/배럴`;

        let judgment, cls;
        if (ratio <= 0.9)      { judgment = '저비용 구간 🟢'; cls = 'judgment-cheap'; }
        else if (ratio >= 1.1) { judgment = '고비용 경보 🔴'; cls = 'judgment-expensive'; }
        else                   { judgment = '정상 범위 🟡';   cls = 'judgment-normal'; }

        const jEl = document.getElementById('result-judgment');
        jEl.textContent = judgment;
        jEl.className = 'result-judgment ' + cls;
      }
    });

    // 초기 로드
    loadSummary();
    loadChart('usdkrw');
    loadAvgEnergy();
  </script>

</body>
</html>
